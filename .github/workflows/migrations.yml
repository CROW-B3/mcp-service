    feat: separate D1 migrations workflow from docker build
    
    - Create dedicated migrations.yml workflow for handling D1 migrations
    - Remove D1 migration steps from docker.yml to separate concerns
    - Migrations now run independently on main (DEV) and stable (PROD) branches

diff --git a/.github/workflows/migrations.yml b/.github/workflows/migrations.yml
new file mode 100644
index 0000000..6883150
--- /dev/null
+++ b/.github/workflows/migrations.yml
@@ -0,0 +1,33 @@
+name: D1 Migrations
+
+on:
+  push:
+    branches:
+      - main
+      - stable
+
+jobs:
+  migrations:
+    runs-on: ubuntu-latest
+
+    steps:
+      - name: Checkout code
+        uses: actions/checkout@v4
+
+      - name: Setup Bun
+        uses: oven-sh/setup-bun@v2
+
+      - name: Install dependencies
+        run: bun install
+
+      - name: Apply D1 Migrations (DEV)
+        if: github.ref == 'refs/heads/main'
+        env:
+          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
+        run: bun run db:migrate:dev
+
+      - name: Apply D1 Migrations (PROD)
+        if: github.ref == 'refs/heads/stable'
+        env:
+          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
+        run: bun run db:migrate:prod
